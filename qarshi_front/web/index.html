<!DOCTYPE html>
<html>
<head>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="qarshi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>qarshi</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Экран загрузки — виден, пока грузится Flutter (вместо белого экрана) */
    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8FAFC;
      z-index: 9999;
      transition: opacity 0.35s ease;
    }
    #app-loader.hidden { opacity: 0; pointer-events: none; }
    #app-loader .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(37, 99, 235, 0.2);
      border-top-color: #2563EB;
      border-radius: 50%;
      animation: app-spin 0.8s linear infinite;
    }
    @keyframes app-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="spinner"></div>
  </div>

  <script>
    // Разрегистрируем любой старый service worker и чистим кэши: в вебвью Telegram
    // застрявший SW отдаёт битый закэшированный shell (белый экран). Раздача идёт
    // через Django с no-cache, поэтому SW не нужен.
    (function () {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    })();
  </script>

  <script>
    // Убираем лоадер, как только Flutter отрисовал первый кадр.
    (function () {
      var removed = false;
      function hideLoader() {
        if (removed) return;
        removed = true;
        var el = document.getElementById('app-loader');
        if (!el) return;
        el.classList.add('hidden');
        setTimeout(function () { if (el && el.parentNode) el.parentNode.removeChild(el); }, 400);
      }
      window.addEventListener('flutter-first-frame', hideLoader);
      // Подстраховка: если событие по какой-то причине не пришло — снимаем через 12с.
      setTimeout(hideLoader, 12000);
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
